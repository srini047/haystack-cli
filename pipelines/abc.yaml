# Indexing Pipeline — Converter + Splitter + Embedder + Writer
# Store: weaviate | Provider: ollama

components:
  converter:
    type: haystack.components.converters.txt.TextFileToDocument
    init_parameters: {}

  splitter:
    type: haystack.components.preprocessors.document_splitter.DocumentSplitter
    init_parameters:
      split_by: word
      split_length: 200
      split_overlap: 20

  embedder:
    type: haystack_integrations.components.embedders.ollama.document_embedder.OllamaDocumentEmbedder
    init_parameters: {}

  writer:
    type: haystack.components.writers.document_writer.DocumentWriter
    init_parameters:
      document_store:
        type: haystack_integrations.document_stores.weaviate.document_store.WeaviateDocumentStore
        init_parameters: {}

connections:
  - sender: converter.documents
    receiver: splitter.documents
  - sender: splitter.documents
    receiver: embedder.documents
  - sender: embedder.documents
    receiver: writer.documents

inputs:
  sources:
    - converter.sources
