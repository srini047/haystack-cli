# Indexing Pipeline — Converter + Splitter + Embedder + Writer
# Store: {{ document_store }} | Provider: {{ llm_provider }}

components:
  converter:
    type: haystack.components.converters.txt.TextFileToDocument
    init_parameters: {}

  splitter:
    type: haystack.components.preprocessors.document_splitter.DocumentSplitter
    init_parameters:
      split_by: word
      split_length: 200
      split_overlap: 20

  embedder:
    type: {{ embedder_type }}
    init_parameters: {}

  writer:
    type: haystack.components.writers.document_writer.DocumentWriter
    init_parameters:
      document_store:
        type: {{ document_store_type }}
        init_parameters: {}

connections:
  - sender: converter.documents
    receiver: splitter.documents
  - sender: splitter.documents
    receiver: embedder.documents
  - sender: embedder.documents
    receiver: writer.documents

inputs:
  sources:
    - converter.sources
